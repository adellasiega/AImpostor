<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="1040" viewBox="0 0 1480 1040" role="img" aria-labelledby="title desc">
  <title id="title">AImpostor Project UML Diagram</title>
  <desc id="desc">UML-style class diagram for the current AImpostor Python project.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1f2933"/>
    </marker>
    <marker id="hollow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M2,7 L12,2 L12,12 Z" fill="#ffffff" stroke="#1f2933" stroke-width="1.6"/>
    </marker>
    <style>
      .bg { fill: #f6f8fb; }
      .class { fill: #ffffff; stroke: #1f2933; stroke-width: 2; rx: 8; }
      .type { fill: #f0f7ff; stroke: #1d5f99; stroke-width: 2; rx: 8; }
      .model { fill: #f7f2ff; stroke: #6d28d9; stroke-width: 2; rx: 8; }
      .header { fill: #e8edf3; }
      .typeHeader { fill: #dbeafe; }
      .modelHeader { fill: #ede9fe; }
      .title { font-family: Arial, sans-serif; font-size: 28px; font-weight: 700; fill: #111827; }
      .name { font-family: Arial, sans-serif; font-size: 17px; font-weight: 700; fill: #111827; }
      .text { font-family: Arial, sans-serif; font-size: 13px; fill: #243447; }
      .small { font-family: Arial, sans-serif; font-size: 12px; fill: #465461; }
      .rel { stroke: #1f2933; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .inherit { stroke: #1f2933; stroke-width: 2; fill: none; marker-end: url(#hollow); }
      .dep { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 7 5; marker-end: url(#arrow); }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #334155; font-weight: 700; }
    </style>
  </defs>

  <rect class="bg" width="1480" height="1040"/>
  <text x="740" y="48" text-anchor="middle" class="title">AImpostor Project UML Diagram</text>
  <text x="740" y="75" text-anchor="middle" class="small">Current CLI, LangGraph, player, LLM, and TypedDict structure</text>

  <g id="Game">
    <rect class="class" x="70" y="120" width="330" height="295"/>
    <rect class="header" x="70" y="120" width="330" height="42" rx="8"/>
    <text class="name" x="235" y="147" text-anchor="middle">Game</text>
    <line x1="70" y1="162" x2="400" y2="162" stroke="#1f2933"/>
    <text class="text" x="88" y="187">config_file: str</text>
    <text class="text" x="88" y="208">input_fn: Callable</text>
    <text class="text" x="88" y="229">rng: random.Random</text>
    <line x1="70" y1="248" x2="400" y2="248" stroke="#1f2933"/>
    <text class="text" x="88" y="273">build_graph()</text>
    <text class="text" x="88" y="294">run() -&gt; GameState</text>
    <text class="text" x="88" y="315">game_settings(state)</text>
    <text class="text" x="88" y="336">chat(state), say_word(state), voting(state)</text>
    <text class="text" x="88" y="357">win_check(state), end_game(state)</text>
    <text class="text" x="88" y="378">assign_roles(players, n_impostors)</text>
    <text class="text" x="88" y="399">choose_word_pair(config)</text>
  </g>

  <g id="Player">
    <rect class="class" x="565" y="120" width="310" height="255"/>
    <rect class="header" x="565" y="120" width="310" height="42" rx="8"/>
    <text class="name" x="720" y="147" text-anchor="middle">Player (ABC)</text>
    <line x1="565" y1="162" x2="875" y2="162" stroke="#1f2933"/>
    <text class="text" x="583" y="187">id: int | None</text>
    <text class="text" x="583" y="208">name: str</text>
    <text class="text" x="583" y="229">is_impostor: bool</text>
    <text class="text" x="583" y="250">word: str</text>
    <text class="text" x="583" y="271">role: property</text>
    <line x1="565" y1="290" x2="875" y2="290" stroke="#1f2933"/>
    <text class="text" x="583" y="315">say_word(game_state)</text>
    <text class="text" x="583" y="336">send_message(game_state)</text>
    <text class="text" x="583" y="357">vote(game_state), guess_word(game_state)</text>
  </g>

  <g id="Human">
    <rect class="class" x="490" y="500" width="280" height="190"/>
    <rect class="header" x="490" y="500" width="280" height="42" rx="8"/>
    <text class="name" x="630" y="527" text-anchor="middle">Human</text>
    <line x1="490" y1="542" x2="770" y2="542" stroke="#1f2933"/>
    <text class="text" x="508" y="567">input_fn: Callable</text>
    <line x1="490" y1="586" x2="770" y2="586" stroke="#1f2933"/>
    <text class="text" x="508" y="611">say_word(game_state)</text>
    <text class="text" x="508" y="632">send_message(game_state)</text>
    <text class="text" x="508" y="653">vote(game_state)</text>
    <text class="text" x="508" y="674">guess_word(game_state)</text>
  </g>

  <g id="Agent">
    <rect class="class" x="850" y="500" width="315" height="210"/>
    <rect class="header" x="850" y="500" width="315" height="42" rx="8"/>
    <text class="name" x="1007" y="527" text-anchor="middle">Agent</text>
    <line x1="850" y1="542" x2="1165" y2="542" stroke="#1f2933"/>
    <text class="text" x="868" y="567">llm: LLMManager</text>
    <text class="text" x="868" y="588">config: dict</text>
    <line x1="850" y1="607" x2="1165" y2="607" stroke="#1f2933"/>
    <text class="text" x="868" y="632">_visible_context(game_state)</text>
    <text class="text" x="868" y="653">say_word(game_state)</text>
    <text class="text" x="868" y="674">send_message(game_state)</text>
    <text class="text" x="868" y="695">vote(game_state), guess_word(game_state)</text>
  </g>

  <g id="LLMManager">
    <rect class="class" x="1115" y="120" width="295" height="155"/>
    <rect class="header" x="1115" y="120" width="295" height="42" rx="8"/>
    <text class="name" x="1262" y="147" text-anchor="middle">LLMManager (ABC)</text>
    <line x1="1115" y1="162" x2="1410" y2="162" stroke="#1f2933"/>
    <text class="text" x="1133" y="187">ask(prompt, system_prompt,</text>
    <text class="text" x="1133" y="208">tools, response_format)</text>
    <text class="text" x="1133" y="229">-&gt; tuple[BaseModel | str | None, list | None]</text>
  </g>

  <g id="OllamaManager">
    <rect class="class" x="1115" y="305" width="295" height="180"/>
    <rect class="header" x="1115" y="305" width="295" height="42" rx="8"/>
    <text class="name" x="1262" y="332" text-anchor="middle">OllamaManager</text>
    <line x1="1115" y1="347" x2="1410" y2="347" stroke="#1f2933"/>
    <text class="text" x="1133" y="372">model_name: str</text>
    <text class="text" x="1133" y="393">think: bool</text>
    <text class="text" x="1133" y="414">options: dict</text>
    <line x1="1115" y1="433" x2="1410" y2="433" stroke="#1f2933"/>
    <text class="text" x="1133" y="458">ask(...)</text>
  </g>

  <g id="GameState">
    <rect class="type" x="70" y="520" width="330" height="300"/>
    <rect class="typeHeader" x="70" y="520" width="330" height="42" rx="8"/>
    <text class="name" x="235" y="547" text-anchor="middle">GameState (TypedDict)</text>
    <line x1="70" y1="562" x2="400" y2="562" stroke="#1d5f99"/>
    <text class="text" x="88" y="587">players: list[Any]</text>
    <text class="text" x="88" y="608">eliminated_players: list[Any]</text>
    <text class="text" x="88" y="629">turn, current_player: int</text>
    <text class="text" x="88" y="650">civilian_word, impostor_word: str</text>
    <text class="text" x="88" y="671">word_history, chat_history: str</text>
    <text class="text" x="88" y="692">used_words: list[str]</text>
    <text class="text" x="88" y="713">votes: dict[int, int]</text>
    <text class="text" x="88" y="734">last_eliminated, last_chance_guess</text>
    <text class="text" x="88" y="755">winner: str | None</text>
    <text class="text" x="88" y="776">game_over: bool</text>
    <text class="text" x="88" y="797">config: dict[str, Any]</text>
  </g>

  <g id="Formats">
    <rect class="model" x="505" y="805" width="640" height="150"/>
    <rect class="modelHeader" x="505" y="805" width="640" height="42" rx="8"/>
    <text class="name" x="825" y="832" text-anchor="middle">Pydantic LLM Output Models</text>
    <line x1="505" y1="847" x2="1145" y2="847" stroke="#6d28d9"/>
    <text class="text" x="525" y="872">ChatOutputFormat: action = "send" | "skip", message: str</text>
    <text class="text" x="525" y="895">WordOutputFormat: word: str</text>
    <text class="text" x="525" y="918">VoteOutputFormat: player_id: int, reason: str</text>
    <text class="text" x="525" y="941">GuessOutputFormat: word: str</text>
  </g>

  <path class="inherit" d="M630 500 V440 H690 V375"/>
  <path class="inherit" d="M1007 500 V440 H750 V375"/>
  <path class="inherit" d="M1262 305 L1262 275"/>

  <path class="rel" d="M400 250 H455 V220 H565"/>
  <rect x="423" y="198" width="120" height="20" rx="4" fill="#f6f8fb"/>
  <text class="label" x="483" y="212" text-anchor="middle">creates / owns players</text>

  <path class="dep" d="M400 604 H472 V642 H490"/>
  <rect x="402" y="572" width="86" height="24" rx="4" fill="#f6f8fb"/>
  <text class="label" x="445" y="588" text-anchor="middle">state contains</text>

  <path class="dep" d="M1165 605 H1262 V485"/>
  <rect x="1182" y="582" width="62" height="20" rx="4" fill="#f6f8fb"/>
  <text class="label" x="1213" y="596" text-anchor="middle">uses llm</text>

  <path class="dep" d="M1007 710 V760 H890 V805"/>
  <text class="label" x="915" y="752">parses JSON as</text>

  <path class="dep" d="M120 415 V520"/>
  <text class="label" x="132" y="470">reads / mutates</text>

  <rect x="1185" y="790" width="225" height="120" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text class="label" x="1297" y="820" text-anchor="middle">Entry point</text>
  <text class="text" x="1205" y="850">main.py</text>
  <text class="small" x="1205" y="872">parse --config</text>
  <text class="small" x="1205" y="894">Game(...).run()</text>
</svg>
